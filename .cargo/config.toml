# Use the mold linker for Linux builds (the Docker image installs it).
[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

# kls-core is fetched over public HTTPS, so libgit2 handles it and no SSH agent,
# credential helper, or `git-fetch-with-cli` escape hatch is needed. A clean
# checkout builds with nothing but a Rust toolchain.
