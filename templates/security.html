{% extends "layout.html" %}

{% block title %}Security | Vantage{% endblock %}

{% block head %}
<link rel="stylesheet" href="/static/vendor/uplot.min.css">
<link rel="stylesheet" href="/static/css/pages/security.css">
{% endblock %}

{% block content %}
{#
    The capability flags reach JS as data attributes rather than an inline
    <script> that assigns a global. Same information, no inline JS, so the CSP
    stays nonce-free — and the flags sit on the element that actually varies
    with them.
#}
<div class="page-head" id="page" data-geoip="{{ geoip_enabled }}" data-cloudflare="{{ cloudflare_enabled }}">
    <div class="page-head-text">
        <h1>Security</h1>
        <p class="page-sub">Rejected requests reaching this host — who sent them, and why they were refused.</p>
    </div>
    <div class="page-actions">
        <div class="segmented" id="range" role="group" aria-label="Time range">
            <button data-value="1h" aria-selected="false">1h</button>
            <button data-value="6h" aria-selected="false">6h</button>
            <button data-value="24h" aria-selected="true">24h</button>
            <button data-value="7d" aria-selected="false">7d</button>
            <button data-value="30d" aria-selected="false">30d</button>
        </div>
    </div>
</div>

{% if !geoip_enabled %}
<div class="callout info">
    <svg class="icon" aria-hidden="true"><use href="/static/icons/sprite.svg#globe"/></svg>
    <div class="callout-body">
        <strong>Locations are unavailable.</strong>
        Addresses are shown without a country. To resolve them, point <code>geoip_path</code> in
        <code>config.json</code> at a MaxMind <code>GeoLite2-City.mmdb</code> file and restart Vantage.
    </div>
</div>
{% endif %}

<section>
    <div class="stat-grid" id="tiles"></div>
</section>

<section>
    <div class="section-head">
        <h2>Rejected requests over time</h2>
    </div>
    <div class="card">
        <div class="card-body">
            <div class="chart" id="chart-timeline"></div>
        </div>
    </div>
</section>

<div class="split">
    <section>
        <div class="section-head">
            <h2>Top addresses</h2>
            <span class="count-badge" id="ip-count">0</span>
        </div>
        <div class="card">
            <div class="card-body flush">
                <div class="table-wrap">
                    <table class="table" id="top-ips">
                        <thead>
                            <tr>
                                <th>Address</th>
                                {% if geoip_enabled %}<th>Location</th>{% endif %}
                                <th class="num">Rejected</th>
                            </tr>
                        </thead>
                        <tbody id="top-ips-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </section>

    <section>
        <div class="section-head">
            <h2>Why they were rejected</h2>
        </div>
        <div class="card">
            <div class="card-body">
                <div class="bars" id="reasons"></div>
            </div>
        </div>
    </section>
</div>

{% if geoip_enabled %}
<section>
    <div class="section-head">
        <h2>Where traffic comes from</h2>
    </div>
    <div class="card">
        <div class="card-body">
            {#
                This panel counts a *sample* — the newest 5000 requests in the
                window, not all of them (see security.rs). Saying so is the
                difference between a ranking and a fabricated total.
            #}
            <p class="panel-note" id="country-note">Ranked across the most recent requests in this range.</p>
            <div class="bars" id="countries"></div>
        </div>
    </div>
</section>
{% endif %}

<section>
    <div class="section-head">
        <h2>Recent events</h2>
    </div>
    <div class="card">
        <div class="card-body flush">
            <div class="table-wrap">
                <table class="table" id="recent">
                    <thead>
                        <tr>
                            <th>When</th>
                            <th>Address</th>
                            <th>Status</th>
                            <th>Reason</th>
                            <th>Path</th>
                        </tr>
                    </thead>
                    <tbody id="recent-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</section>

{% if cloudflare_enabled %}
<section id="cf">
    <div class="section-head">
        <h2>Cloudflare</h2>
        <span class="chip" id="cf-state">Loading…</span>
    </div>

    <div class="stat-grid" id="cf-tiles"></div>

    <div class="card cf-chart-card">
        <div class="card-header">
            <h3>Traffic and threats</h3>
        </div>
        <div class="card-body">
            <div class="chart" id="chart-cf"></div>
        </div>
    </div>

    <div class="card">
        <div class="card-header">
            <h3>Firewall events</h3>
        </div>
        <div class="card-body flush">
            <div class="table-wrap">
                <table class="table" id="cf-events">
                    <thead>
                        <tr>
                            <th>When</th>
                            <th>Action</th>
                            <th>Rule</th>
                            <th>Address</th>
                            <th>Path</th>
                        </tr>
                    </thead>
                    <tbody id="cf-events-body"></tbody>
                </table>
            </div>
        </div>
    </div>
</section>
{% endif %}
{% endblock %}

{% block scripts %}
<script src="/static/vendor/uplot.iife.min.js"></script>
<script type="module" src="/static/js/pages/security.js"></script>
{% endblock %}
