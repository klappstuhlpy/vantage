name: Release

on:
  push:
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/klappstuhlpy/vantage

jobs:
  # Each architecture builds on its own native runner rather than under QEMU:
  # emulated Rust builds are slow enough to dominate the whole release.
  build:
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            suffix: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            suffix: arm64
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Per-architecture tags; the manifest job below joins them into one
      # multi-arch reference. These intermediate tags are an implementation
      # detail of the release and are not what anyone pulls.
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ env.IMAGE }}:${{ github.ref_name }}-${{ matrix.suffix }}
          cache-from: type=gha,scope=${{ matrix.suffix }}
          cache-to: type=gha,mode=max,scope=${{ matrix.suffix }}

  manifest:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Assemble the multi-arch manifest
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          for TAG in "$VERSION" latest; do
            docker buildx imagetools create -t "$IMAGE:$TAG" \
              "$IMAGE:${GITHUB_REF_NAME}-amd64" \
              "$IMAGE:${GITHUB_REF_NAME}-arm64"
          done

      # The release body is what the dashboard renders as release notes, so a
      # tag whose version has no changelog section fails the release rather than
      # publishing an empty one.
      - name: Extract the release notes
        id: notes
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          {
            echo 'body<<CHANGELOG_EOF'
            python scripts/changelog_section.py "$VERSION"
            echo 'CHANGELOG_EOF'
          } >> "$GITHUB_OUTPUT"

      # Neither a draft nor a prerelease: the in-app checker reads
      # /releases/latest, which skips both.
      - name: Publish the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.body }}
          make_latest: true
